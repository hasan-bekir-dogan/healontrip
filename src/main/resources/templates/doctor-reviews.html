<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body>

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <!-- Header -->
        <th:block th:include="fragments/header"></th:block>
        <!-- /Header -->

        <!-- Breadcrumb -->
        <div class="breadcrumb-bar-two">
            <div class="container">
                <div class="row align-items-center inner-banner">
                    <div class="col-md-12 col-12 text-center">
                        <h2 class="breadcrumb-title">Doctor Profile</h2>
                        <nav aria-label="breadcrumb" class="page-breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                                <li class="breadcrumb-item" aria-current="page">Doctor Profile</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
        <!-- /Breadcrumb -->

        <!-- Page Content -->
        <div class="content">
            <div class="container">

                <div class="row">
                    <div class="col-md-5 col-lg-4 col-xl-3 theiaStickySidebar">

                        <!-- Profile Sidebar -->
                        <div class="profile-sidebar">
                            <div class="widget-profile pro-widget-content">
                                <div class="profile-info-widget">
                                    <a th:href="@{'/doctor/' + ${doctor.userName}}" class="booking-doc-img">
                                        <img th:src="@{'/' + ${doctor.userImgSrc}}" th:alt="${doctor.userImgAlt}">
                                    </a>
                                    <div class="profile-det-info">
                                        <h3 th:text="${doctor.extendedUserName}"></h3>

                                        <div class="patient-details">
                                            <h5 class="mb-0" th:text="${doctor.infoShort}"></h5>
                                        </div>

                                        <div class="rating">
                                            <span class="d-inline-block average-rating rating-avg" th:text="${reviewInfo.ratingAvg}"></span>
                                            <i class="fas fa-star filled"></i>
                                            <i class="fas fa-star filled"></i>
                                            <i class="fas fa-star filled"></i>
                                            <i class="fas fa-star filled"></i>
                                            <i class="fas fa-star"></i>
                                            <span class="dot"></span>
                                            <span class="d-inline-block average-rating rating-count"><th:block th:text="${reviewInfo.ratingCount}"></th:block> Reviews</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- /Profile Sidebar -->

                    </div>
                    <div class="col-md-7 col-lg-8 col-xl-9">
                        <div class="doc-review review-listing">

                            <!-- Review Listing -->
                            <ul class="comments-list">

                                <!-- Comment List -->
                                <th:block th:each="review: ${reviewList}">

                                    <li>
                                        <div class="comment">
                                            <img th:src="@{'/' + ${review.patientProfileImgSrc}}" class="avatar avatar-sm rounded-circle" th:alt="${review.patientProfileImgAlt}">
                                            <div class="comment-body">
                                                <div class="meta-data">
                                                    <span class="comment-author" th:text="${review.patientFullName}"></span>
                                                    <span class="comment-date" th:text="${review.createdDate}"></span>
                                                    <div class="review-count rating">
                                                        <i class="fas fa-star" th:classappend="${review.rating >= 1} ? 'filled'"></i>
                                                        <i class="fas fa-star" th:classappend="${review.rating >= 2} ? 'filled'"></i>
                                                        <i class="fas fa-star" th:classappend="${review.rating >= 3} ? 'filled'"></i>
                                                        <i class="fas fa-star" th:classappend="${review.rating >= 4} ? 'filled'"></i>
                                                        <i class="fas fa-star" th:classappend="${review.rating == 5} ? 'filled'"></i>
                                                    </div>
                                                </div>
                                                <p class="comment-content" th:text="${review.detail}"></p>
                                            </div>
                                        </div>
                                    </li>

                                </th:block>
                                <!-- /Comment List -->

                            </ul>
                            <!-- /Comment List -->

                            <!-- Review Pagination -->
                            <div class="row review-pagination" th:if="${pageCount > 1}">
                                <div class="col-md-12">
                                    <div class="blog-pagination">
                                        <nav>
                                            <ul class="pagination justify-content-center">
                                                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                                    <a class="page-link" th:href="@{'/doctor/' + ${doctor.userName} + '/reviews?page=' + ${1}}" tabindex="-1">
                                                        <i class="fas fa-angle-double-left"></i>
                                                    </a>
                                                </li>

                                                <th:block th:each="i: ${#numbers.sequence(1, pageCount)}">

                                                    <li class="page-item" th:classappend="${currentPage == i} ? 'active'">
                                                        <a class="page-link" th:href="@{'/doctor/' + ${doctor.userId} + '/reviews?page=' + ${i}}">
                                                            <th:block th:text="${i}"></th:block>
                                                        </a>
                                                    </li>

                                                </th:block>

                                                <li class="page-item" th:classappend="${currentPage >= pageCount} ? 'disabled'">
                                                    <a class="page-link" th:href="@{'/doctor/' + ${doctor.userId} + '/reviews?page=' + ${pageCount}}">
                                                        <i class="fas fa-angle-double-right"></i>
                                                    </a>
                                                </li>
                                            </ul>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <!-- /Review Pagination -->

                        </div>
                    </div>
                </div>
            </div>

        </div>
        <!-- /Page Content -->

        <!-- Footer -->
        <th:block th:include="fragments/footer"></th:block>
        <!-- /Footer -->

    </div>
    <!-- /Main Wrapper -->

    <!-- jQuery -->
    <script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

    <!-- Bootstrap Bundle JS -->
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

    <!-- Sticky Sidebar JS -->
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/ResizeSensor.js}"></script>
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/theia-sticky-sidebar.js}"></script>

    <!-- Custom JS -->
    <script th:src="@{/assets/js/script.js}"></script>
    <script th:src="@{/assets/js/custom/function.js}"></script>
    <script th:src="@{/assets/js/custom/custom.js}"></script>

</body>
</html>
