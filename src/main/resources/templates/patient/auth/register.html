<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body class="account-page">

<!-- Main Wrapper -->
<div class="main-wrapper">

    <!-- Header -->
    <th:block th:include="fragments/header"></th:block>
    <!-- /Header -->

    <!-- Page Content -->
    <div class="content">
        <div class="container-fluid">

            <div class="row">
                <div class="col-md-8 offset-md-2">

                    <!-- Register Content -->
                    <div class="account-content">
                        <div class="row align-items-center justify-content-center">
                            <div class="col-md-7 col-lg-6 login-left">
                                <img th:src="@{/assets/img/login-banner.png}" class="img-fluid" alt="Doccure Register">
                            </div>
                            <div class="col-md-12 col-lg-6 login-right">
                                <div class="login-header">
                                    <h3>Patient Register <a th:href="@{/doctor/register}">Are you a Doctor?</a></h3>
                                </div>
                                <div th:if="${param.success}">
                                    <div class="alert alert-info">You have successfully registered!</div>
                                </div>
                                <!-- Register Form -->
                                <form method="post" role="form" class="form-validation" th:action="@{/patient/register}" th:object="${user}">
                                    <div class="form-group form-focus" th:classappend="${#fields.hasErrors('name')} ? 'form-error'">
                                        <input type="text" class="form-control floating" id="name" name="name" th:field="*{name}">
                                        <label class="focus-label">Name</label>
                                        <p th:errors="*{name}" class="text-danger"
                                           th:if="${#fields.hasErrors('name')}">
                                        </p>
                                    </div>
                                    <div class="form-group form-focus" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'form-error'">
                                        <input type="text" class="form-control floating" id="phoneNumber" name="phoneNumber" th:field="*{phoneNumber}">
                                        <label class="focus-label">Mobile Number</label>
                                        <p th:errors="*{phoneNumber}" class="text-danger"
                                            th:if="${#fields.hasErrors('phoneNumber')}"></p>
                                    </div>
                                    <div class="form-group form-focus" th:classappend="${#fields.hasErrors('email')} ? 'form-error'">
                                        <input type="email" class="form-control floating" id="email" name="email" th:field="*{email}">
                                        <label class="focus-label">Your Email Address</label>
                                        <p th:errors="*{email}" class="text-danger"
                                            th:if="${#fields.hasErrors('email')}"></p>
                                    </div>
                                    <div class="form-group form-focus" th:classappend="${#fields.hasErrors('password')} ? 'form-error'">
                                        <input type="password" class="form-control floating" id="password" name="password">
                                        <label class="focus-label">Password</label>
                                        <p th:errors="*{password}" class="text-danger"
                                            th:if="${#fields.hasErrors('password')}"></p>
                                    </div>
                                    <div class="text-end">
                                        <a class="forgot-link" th:href="@{/patient/login}">Already have an account?</a>
                                    </div>
                                    <button class="btn btn-primary w-100 btn-lg login-btn" type="submit">Signup</button>
                                </form>
                                <!-- /Register Form -->

                            </div>
                        </div>
                    </div>
                    <!-- /Register Content -->

                </div>
            </div>

        </div>

    </div>
    <!-- /Page Content -->

    <!-- Footer -->
    <th:block th:include="fragments/footer"></th:block>
    <!-- /Footer -->

</div>
<!-- /Main Wrapper -->

<!-- jQuery -->
<script th:src="@{/assets/js/jquery-3.6.0.min.js}"></script>

<!-- Bootstrap Core JS -->
<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

<!-- Feather Icon JS -->
<script th:src="@{/assets/js/feather.min.js}"></script>

<!-- Custom JS -->
<script th:src="@{/assets/js/script.js}"></script>

</body>
</html>
