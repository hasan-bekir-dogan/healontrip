<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body class="login-body">

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <!-- Header -->
        <th:block th:include="./fragments/header-login"></th:block>
        <!-- /Header -->

        <!-- Page Content -->
        <div class="login-content-info">
            <div class="container">

                <!-- Login Email -->
                <div class="row justify-content-center">
                    <div class="col-lg-4 col-md-6">
                        <div class="account-content">
                            <div class="login-shapes">
                                <div class="shape-img-left">
                                    <img th:src="@{assets/img/shape-01.png}" alt="">
                                </div>
                                <div class="shape-img-right">
                                    <img th:src="@{assets/img/shape-02.png}" alt="">
                                </div>
                            </div>
                            <div class="account-info">
                                <div class="login-back">
                                    <a th:href="@{/}"><i class="fas fa-arrow-left-long"></i> Back</a>
                                </div>
                                <div class="login-title">
                                    <h3>Sign in</h3>
                                    <p>Please enter your details.</p>
                                </div>
                                <div th:if="${param.error}">
                                    <div class="alert alert-danger">Invalid Email or Password.</div>
                                </div>
                                <form method="post" class="form-validation" th:action="@{/login}" role="form">
                                    <div class="form-group">
                                        <label>E-mail</label>
                                        <input type="text" class="form-control" id="email" name="email" placeholder="example@email.com">
                                    </div>
                                    <div class="form-group">
                                        <div class="form-group-flex">
                                            <label>Password</label>
                                            <a th:href="@{/forgot-password}" class="forgot-link">Forgot password?</a>
                                        </div>
                                        <div class="pass-group">
                                            <input type="password" class="form-control pass-input" id="password" name="password" placeholder="*************">
                                            <span class="feather-eye toggle-password"></span>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <button class="btn btn-block" type="submit">Sign in</button>
                                    </div>
                                    <div class="account-signup">
                                        <p>Don't have an account ? <a th:href="@{/register}">Sign up</a></p>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- /Login Email -->

            </div>
        </div>
        <!-- /Page Content -->

    </div>
    <!-- /Main Wrapper -->

    <!-- jQuery -->
    <script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

    <!-- Bootstrap Core JS -->
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

    <!-- Feather Icon JS -->
    <script th:src="@{/assets/js/feather.min.js}"></script>

    <!-- Circle Progress JS -->
    <script th:src="@{assets/js/circle-progress.min.js}"></script>

    <!-- Custom JS -->
    <script th:src="@{/assets/js/script.js}"></script>

</body>
</html>
