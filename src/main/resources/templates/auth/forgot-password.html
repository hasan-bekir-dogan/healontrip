<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Animation CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/aos.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body class="login-body">

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <!-- Header -->
        <th:block th:include="./fragments/header-login"></th:block>
        <!-- /Header -->

        <!-- Page Content -->
        <div class="login-content-info">
            <div class="container">

                <!-- Login Email -->
                <div class="row justify-content-center">
                    <div class="col-lg-4 col-md-6">
                        <div class="account-content">
                            <div class="login-shapes">
                                <div class="shape-img-left">
                                    <img th:src="@{assets/img/shape-01.png}" alt="">
                                </div>
                                <div class="shape-img-right">
                                    <img th:src="@{assets/img/shape-02.png}" alt="">
                                </div>
                            </div>
                            <div class="account-info">
                                <div class="login-back">
                                    <a th:href="@{/login}"><i class="fas fa-arrow-left-long"></i> Back to Login</a>
                                </div>
                                <div class="login-title">
                                    <h3>Forgot Password?</h3>
                                    <p>Enter your email to get a password reset link</p>
                                </div>

                                <div th:if="${param.error}">
                                    <div class="alert alert-danger">Invalid Email.</div>
                                </div>
                                <div th:if="${param.success}">
                                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                                        Reset password link sent to your email!
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                </div>

                                <form method="post" class="form-validation" th:action="@{/forgot-password}" role="form">
                                    <div class="form-group">
                                        <label>E-mail</label>
                                        <input type="text" class="form-control" id="email" name="email" placeholder="example@email.com">
                                    </div>
                                    <div class="form-group remember-password-area">
                                        <div class="form-group-flex">
                                            <label></label>
                                            <a th:href="@{/login}" class="forgot-link">Remember your password?</a>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <button class="btn btn-block" type="submit">Reset Password</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- /Login Email -->

            </div>
        </div>
        <!-- /Page Content -->

    </div>
    <!-- /Main Wrapper -->

    <!-- ChatBot Assistant -->
    <th:block th:include="fragments/chatbot"></th:block>
    <!-- /ChatBot Assistant -->

    <!-- jQuery -->
    <script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

    <!-- Bootstrap Core JS -->
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

    <!-- Feather Icon JS -->
    <script th:src="@{/assets/js/feather.min.js}"></script>

    <!-- Circle Progress JS -->
    <script th:src="@{assets/js/circle-progress.min.js}"></script>

    <!-- Custom JS -->
    <script th:src="@{/assets/js/script.js}"></script>

</body>
</html>
