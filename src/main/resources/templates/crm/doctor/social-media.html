<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body>

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <!-- Header -->
        <th:block th:include="fragments/header"></th:block>
        <!-- /Header -->

        <!-- Breadcrumb -->
        <div class="breadcrumb-bar-two">
            <div class="container">
                <div class="row align-items-center inner-banner">
                    <div class="col-md-12 col-12 text-center">
                        <h2 class="breadcrumb-title">Social Media</h2>
                        <nav aria-label="breadcrumb" class="page-breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                                <li class="breadcrumb-item" aria-current="page">Social Media</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
        <!-- /Breadcrumb -->

        <!-- Page Content -->
        <div class="content">
            <div class="container">

                <div class="row">
                    <th:block th:include="crm/doctor/fragments/left-sidebar"></th:block>


                    <div class="col-md-7 col-lg-8 col-xl-9">
                        <div class="card">
                            <div class="card-body">

                                <div th:if="${param.success}">
                                    <div class="alert alert-info">You have successfully updated social media!</div>
                                </div>

                                <!-- Social Form -->
                                <form method="post" enctype="multipart/form-data" role="form" autocomplete="off" th:action="@{/social-media}" th:object="${socialMedia}">

                                    <div class="row">
                                        <div class="col-md-12 col-lg-8">
                                            <div class="form-group" th:classappend="${#fields.hasErrors('facebookLink')} ? 'form-error'">
                                                <label>Facebook URL</label>
                                                <input type="text" class="form-control" id="facebookLink" name="facebookLink" th:field="*{facebookLink}">
                                                <p th:errors="*{facebookLink}" class="text-danger"
                                                   th:if="${#fields.hasErrors('facebookLink')}"></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-12 col-lg-8">
                                            <div class="form-group" th:classappend="${#fields.hasErrors('twitterLink')} ? 'form-error'">
                                                <label>Twitter URL</label>
                                                <input type="text" class="form-control" id="twitterLink" name="twitterLink" th:field="*{twitterLink}">
                                                <p th:errors="*{twitterLink}" class="text-danger"
                                                   th:if="${#fields.hasErrors('twitterLink')}"></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-12 col-lg-8">
                                            <div class="form-group" th:classappend="${#fields.hasErrors('instagramLink')} ? 'form-error'">
                                                <label>Instagram URL</label>
                                                <input type="text" class="form-control" id="instagramLink" name="instagramLink" th:field="*{instagramLink}">
                                                <p th:errors="*{instagramLink}" class="text-danger"
                                                   th:if="${#fields.hasErrors('instagramLink')}"></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-12 col-lg-8">
                                            <div class="form-group" th:classappend="${#fields.hasErrors('linkedinLink')} ? 'form-error'">
                                                <label>LinkedIn URL</label>
                                                <input type="text" class="form-control" id="linkedinLink" name="linkedinLink" th:field="*{linkedinLink}">
                                                <p th:errors="*{linkedinLink}" class="text-danger"
                                                   th:if="${#fields.hasErrors('linkedinLink')}"></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="submit-section">
                                        <button type="submit" class="btn btn-primary prime-btn">Save Changes</button>
                                    </div>

                                </form>
                                <!-- /Social Form -->

                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
        <!-- /Page Content -->

        <!-- Footer -->
        <th:block th:include="fragments/footer"></th:block>
        <!-- /Footer -->

    </div>
    <!-- /Main Wrapper -->


    <!-- jQuery -->
    <script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

    <!-- Bootstrap Core JS -->
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

    <!-- Sticky Sidebar JS -->
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/ResizeSensor.js}"></script>
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/theia-sticky-sidebar.js}"></script>

    <!-- Custom JS -->
    <script th:src="@{/assets/js/script.js}"></script>

</body>
</html>
