<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Select2 CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/select2/css/select2.min.css}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/bootstrap-tagsinput/css/bootstrap-tagsinput.css}">

    <link rel="stylesheet" th:href="@{/assets/plugins/dropzone/dropzone.min.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body>

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <!-- Header -->
        <th:block th:include="fragments/header"></th:block>
        <!-- /Header -->

        <!-- Breadcrumb -->
        <div class="breadcrumb-bar-two">
            <div class="container">
                <div class="row align-items-center inner-banner">
                    <div class="col-md-12 col-12 text-center">
                        <h2 class="breadcrumb-title">Change Password</h2>
                        <nav aria-label="breadcrumb" class="page-breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                                <li class="breadcrumb-item" aria-current="page">Change Password</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
        <!-- /Breadcrumb -->

        <!-- Page Content -->
        <div class="content profile">
            <div class="container">

                <div class="row">
                    <th:block th:include="crm/patient/fragments/left-sidebar"></th:block>

                    <div class="col-md-7 col-lg-8 col-xl-9">
                        <div class="card">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-12 col-lg-6">

                                        <!-- Change Password Form -->
                                        <form method="post" id="change-password" enctype="multipart/form-data" role="form" autocomplete="off" class="form-validation" th:action="@{/change-password}">

                                            <div id="oldPasswordArea" class="form-group">
                                                <label>Old Password</label>
                                                <section class="pass-area">
                                                    <input type="password" class="form-control pass-input" id="oldPassword" name="oldPassword">
                                                    <span class="feather-eye toggle-password"></span>
                                                </section>
                                            </div>

                                            <div id="newPasswordArea" class="form-group">
                                                <label>New Password</label>
                                                <section class="pass-area">
                                                    <input type="password" class="form-control pass-input-new" id="newPassword" name="newPassword">
                                                    <span class="feather-eye toggle-password-new"></span>
                                                </section>
                                            </div>

                                            <div id="confirmPasswordArea" class="form-group">
                                                <label>Confirm New Password</label>
                                                <section class="pass-area">
                                                    <input type="password" class="form-control pass-input-repeat" id="confirmPassword" name="confirmPassword">
                                                    <span class="feather-eye toggle-password-repeat"></span>
                                                </section>
                                            </div>

                                            <div class="submit-section">
                                                <button type="submit" class="btn btn-primary prime-btn">Save Changes</button>
                                            </div>

                                        </form>
                                        <!-- /Change Password Form -->

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
        <!-- /Page Content -->

        <!-- Footer -->
        <th:block th:include="fragments/footer"></th:block>
        <!-- /Footer -->

    </div>
    <!-- /Main Wrapper -->

    <!-- ChatBot Assistant -->
    <th:block th:include="fragments/chatbot"></th:block>
    <!-- /ChatBot Assistant -->

    <!-- jQuery -->
    <script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

    <!-- Bootstrap Core JS -->
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

    <!-- Sticky Sidebar JS -->
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/ResizeSensor.js}"></script>
    <script th:src="@{/assets/plugins/theia-sticky-sidebar/theia-sticky-sidebar.js}"></script>

    <!-- Select2 JS -->
    <script th:src="@{/assets/plugins/select2/js/select2.min.js}"></script>

    <!-- Dropzone JS -->
    <script th:src="@{/assets/plugins/dropzone/dropzone.min.js}"></script>

    <!-- Bootstrap Tagsinput JS -->
    <script th:src="@{/assets/plugins/bootstrap-tagsinput/js/bootstrap-tagsinput.js}"></script>

    <!-- Profile Settings JS -->
    <script th:src="@{/assets/js/profile-settings.js}"></script>

    <!-- Custom JS -->
    <script th:src="@{/assets/js/script.js}"></script>
    <!--<script th:src="@{/assets/js/patient/functions.js}"></script>
    <script th:src="@{/assets/js/patient/custom.js}"></script>-->

    <!-- CRM JS -->
    <script th:src="@{/assets/js/crm/functions.js}"></script>
    <script th:src="@{/assets/js/crm/custom.js}"></script>

</body>
</html>
