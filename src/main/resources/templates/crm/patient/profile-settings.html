<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <th:block th:include="fragments/head"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/css/all.min.css}">

    <!-- Feathericon CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/feather.css}">

    <!-- Select2 CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/select2/css/select2.min.css}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/assets/plugins/bootstrap-tagsinput/css/bootstrap-tagsinput.css}">

    <link rel="stylesheet" th:href="@{/assets/plugins/dropzone/dropzone.min.css}">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/custom.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/layout.css}">

</head>
<body>

<!-- Main Wrapper -->
<div class="main-wrapper">

    <!-- Header -->
    <th:block th:include="fragments/header"></th:block>
    <!-- /Header -->

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar-two">
        <div class="container">
            <div class="row align-items-center inner-banner">
                <div class="col-md-12 col-12 text-center">
                    <h2 class="breadcrumb-title">Profile Settings</h2>
                    <nav aria-label="breadcrumb" class="page-breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                            <li class="breadcrumb-item" aria-current="page">Profile Settings</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- /Breadcrumb -->

    <!-- Page Content -->
    <div class="content profile">
        <div class="container">

            <div class="row">
                <th:block th:include="crm/patient/fragments/left-sidebar"></th:block>

                <div class="col-md-7 col-lg-8 col-xl-9">

                    <!-- Edit Profile Form -->
                    <form method="post" id="profile-settings" enctype="multipart/form-data" role="form" autocomplete="off" class="form-validation" th:action="@{'/profile'}" th:object="${profile}">

                        <div class="card">
                            <div class="card-body">
                                <div id="profile-information" class="row form-row">
                                    <div class="col-md-6">
                                        <div id="user-email" class="form-group">
                                            <label>Email <span class="text-danger">*</span></label>
                                            <input type="email" class="form-control" th:field="*{email}" th:value="${email}" readonly>
                                            <!--<a href="javascript:void(0);" class="changeEmailButton" data-bs-toggle="modal" data-bs-target="#changeEmailModal">
                                                <i class="fa-regular fa-pen-to-square"></i>
                                            </a>-->
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-userName" class="form-group">
                                            <label>Username <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" th:field="*{userName}" th:value="${userName}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-firstName" class="form-group">
                                            <label>First Name <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" th:field="*{firstName}" th:value="${firstName}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-lastName" class="form-group">
                                            <label>Last Name <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" th:field="*{lastName}" th:value="${lastName}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-phone-number" class="form-group">
                                            <label>Phone Number</label>
                                            <input type="number" class="form-control number-field" th:field="*{phone}" th:value="${phone}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-gender" class="form-group">
                                            <label>Gender</label>
                                            <select class="form-select form-control" id="gender" th:field="*{gender}">
                                                <option value="">Select</option>
                                                <option value="MALE" th:attrappend="selected=${gender == 'MALE'} ? 'selected'">Male</option>
                                                <option value="FEMALE" th:attrappend="selected=${gender == 'FEMALE'} ? 'selected'">Female</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-birth-date" class="form-group">
                                            <label>Date of Birth</label>
                                            <input type="date" class="form-control" th:field="*{dateOfBirth}" th:value="${dateOfBirth}">
                                        </div>
                                    </div>

                                    <div class="col-md-12">
                                        <div id="user-contact-address-line" class="form-group">
                                            <label>Address Line</label>
                                            <input type="text" class="form-control" th:field="*{addressLine}" th:value="${addressLine}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-contact-city" class="form-group">
                                            <label class="control-label">City</label>
                                            <input type="text" class="form-control" th:field="*{city}" th:value="${city}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-contact-state" class="form-group">
                                            <label class="control-label">State / Province</label>
                                            <input type="text" class="form-control" th:field="*{state}" th:value="${state}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-contact-country" class="form-group">
                                            <label class="control-label">Country</label>
                                            <input type="text" class="form-control" th:field="*{country}" th:value="${country}">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="user-contact-postal-code" class="form-group">
                                            <label class="control-label">Postal Code</label>
                                            <input type="text" class="form-control" th:field="*{postalCode}" th:value="${postalCode}">
                                        </div>
                                    </div>
                                </div>

                                <div id="save-patient-profile-settings-btn" class="submit-section">
                                    <button type="submit" class="btn btn-primary submit-btn" name="form_submit">Save Changes</button>
                                </div>
                            </div>
                        </div>

                    </form>
                    <!-- /Edit Profile Form -->

                </div>
            </div>

        </div>

    </div>
    <!-- /Page Content -->

    <!-- Footer -->
    <th:block th:include="fragments/footer"></th:block>
    <!-- /Footer -->

</div>
<!-- /Main Wrapper -->

<!-- jQuery -->
<script th:src="@{/assets/js/jquery-3.6.4.min.js}"></script>

<!-- Bootstrap Core JS -->
<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>

<!-- Sticky Sidebar JS -->
<script th:src="@{/assets/plugins/theia-sticky-sidebar/ResizeSensor.js}"></script>
<script th:src="@{/assets/plugins/theia-sticky-sidebar/theia-sticky-sidebar.js}"></script>

<!-- Select2 JS -->
<script th:src="@{/assets/plugins/select2/js/select2.min.js}"></script>

<!-- Dropzone JS -->
<script th:src="@{/assets/plugins/dropzone/dropzone.min.js}"></script>

<!-- Bootstrap Tagsinput JS -->
<script th:src="@{/assets/plugins/bootstrap-tagsinput/js/bootstrap-tagsinput.js}"></script>

<!-- Profile Settings JS -->
<script th:src="@{/assets/js/profile-settings.js}"></script>

<!-- Custom JS -->
<script th:src="@{/assets/js/script.js}"></script>
<script th:src="@{/assets/js/patient/functions.js}"></script>
<script th:src="@{/assets/js/patient/custom.js}"></script>

</body>
</html>
