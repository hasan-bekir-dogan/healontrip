
<div class="col-md-5 col-lg-4 col-xl-3 theiaStickySidebar">

    <!-- Profile Sidebar -->
    <div class="profile-sidebar">
        <div class="widget-profile pro-widget-content">
            <div class="profile-info-widget">
                <a href="#" class="booking-doc-img">
                    <img th:src="${user.profileImgSrc}" alt="User Image">
                </a>
                <div class="profile-det-info">
                    <h3 th:text="${user.userName}"></h3>

                    <div class="patient-details">
                        <h5 class="mb-0">BDS, MDS - Oral & Maxillofacial Surgery</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-widget">
            <nav class="dashboard-menu">
                <ul>
                    <li th:classappend="${#httpServletRequest.requestURI == '/doctor/dashboard'} ? 'active'">
                        <a th:href="@{/doctor/dashboard}">
                            <i class="fas fa-columns"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-calendar-check"></i>
                            <span>Appointments</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-user-injured"></i>
                            <span>My Patients</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-hourglass-start"></i>
                            <span>Schedule Timings</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-clock"></i>
                            <span>Available Timings</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-file-invoice"></i>
                            <span>Invoices</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-file-invoice-dollar"></i>
                            <span>Accounts</span>
                        </a>
                    </li>
                    <li th:classappend="${#httpServletRequest.requestURI.startsWith('/doctor/blogs')} ? 'active'">
                        <a th:href="@{/doctor/blogs}">
                            <i class="fas fa-pager"></i>
                            <span>Blogs</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-star"></i>
                            <span>Reviews</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-comments"></i>
                            <span>Message</span>
                            <small class="unread-msg">23</small>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-user-cog"></i>
                            <span>Profile Settings</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-share-alt"></i>
                            <span>Social Media</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{#}">
                            <i class="fas fa-lock"></i>
                            <span>Change Password</span>
                        </a>
                    </li>
                    <li class="doctor-logout">
                        <form method="post" th:action="@{/doctor/logout}" role="form">
                            <a onclick="this.parentNode.submit();">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </a>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    <!-- /Profile Sidebar -->

</div>
