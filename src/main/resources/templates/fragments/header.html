
<header class="header">

                <span class="bar-icon bar-icon-one">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </a>
            <a th:href="@{/}" class="navbar-brand logo">
                <img th:src="@{/assets/img/logo.png}" class="img-fluid" alt="Logo">
            </a>
        </div>
        <div class="main-menu-wrapper">
            <div class="menu-header">
                <a th:href="@{/}" class="menu-logo">
                    <img th:src="@{/assets/img/logo.png}" class="img-fluid" alt="Logo">
                </a>
                <a id="menu_close" class="menu-close" href="javascript:void(0);">
                    <i class="fas fa-times"></i>
                </a>
            </div>
            <ul class="main-nav">
                <!-- navbar items -->
                <!--<li class="has-submenu" th:classappend="${#httpServletRequest.requestURI.startsWith('/doctors')} ? 'active'">
                    <a th:href="@{#}">Doctors</a>
                </li>-->
                <li class="has-submenu">
                    <a th:href="@{#}">Help</a>
                </li>
                <!-- /navbar items -->


                <!-- User profile -->
                <!--<li th:if="${session.userEmail == null}" class="login-link">
                    <a th:href="@{/patient/login}">Login / Signup</a>
                </li>-->
                <!-- /User profile -->
            </ul>
        </div>

        <ul class="nav header-navbar-rht">
            <li th:if="${session.userEmail == null}" class="nav-item">
                <a class="nav-link header-login btn-one-light" th:href="@{/patient/login}">login / Signup </a>
            </li>

            <th:block th:unless="${session.userEmail == null}">
                <!-- User Menu -->
                <li class="nav-item dropdown has-arrow logged-item">
                    <a href="#" class="dropdown-toggle nav-link" data-bs-toggle="dropdown">
                        <span class="user-img">
                            <img class="rounded-circle" th:src="@{'/' + ${user.profileImgSrc}}" width="31" th:alt="${user.userName}">
                        </span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <div class="user-header">
                            <div class="avatar avatar-sm">
                                <img th:src="@{'/' + ${user.profileImgSrc}}" th:alt="${user.profileImgAlt}" class="avatar-img rounded-circle">
                            </div>
                            <div class="user-text">
                                <h6 th:text="${user.userName}"></h6>
                                <p class="text-muted mb-0" th:text="${user.role}"></p>
                            </div>
                        </div>
                        <a class="dropdown-item" th:href="@{#}">Dashboard</a>
                        <a class="dropdown-item" th:href="@{#}">Profile Settings</a>
                        <form method="post" th:action="@{/doctor/logout}" role="form">
                            <a class="dropdown-item" onclick="this.parentNode.submit();">
                                Logout
                            </a>
                        </form>
                    </div>
                </li>
                <!-- /User Menu -->
            </th:block>
        </ul>
    </nav>
