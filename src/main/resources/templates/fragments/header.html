
<header class="header">
    <nav class="navbar navbar-expand-lg header-nav">
        <div class="navbar-header">
            <a id="mobile_btn" href="javascript:void(0);">
                            <span class="bar-icon bar-icon-one">
                                <span></span>
                                <span></span>
                                <span></span>
                            </span>
            </a>
            <a th:href="@{/}" class="navbar-brand logo">
                <img th:src="@{/assets/img/logo.png}" class="img-fluid" alt="Logo">
            </a>
        </div>
        <div class="main-menu-wrapper">
            <div class="menu-header">
                <a th:href="@{/}" class="menu-logo">
                    <img th:src="@{/assets/img/logo.png}" class="img-fluid" alt="Logo">
                </a>
                <a id="menu_close" class="menu-close" href="javascript:void(0);">
                    <i class="fas fa-times"></i>
                </a>
            </div>
            <ul class="main-nav">
                <!-- Doctor navbar items -->
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu" th:classappend="${#httpServletRequest.requestURI.startsWith('/doctor/dashboard')} ? 'active'">
                    <a th:href="@{/doctor/dashboard}">Dashboard</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu">
                    <a th:href="@{#}">Appointments</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu">
                    <a th:href="@{#}">Schedule Timing</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu">
                    <a th:href="@{#}">Patients</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu">
                    <a th:href="@{#}">Invoices</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu">
                    <a th:href="@{#}">Reviews</a>
                </li>
                <li th:if="${session.userRole == 'DOCTOR'}" class="has-submenu" th:classappend="${#httpServletRequest.requestURI.startsWith('/doctor/blogs')} ? 'active'">
                    <a th:href="@{/doctor/blogs}">Blogs</a>
                </li>
                <!-- /Doctor navbar items -->


                <!-- Patient navbar items -->
                <li th:if="${session.userRole == 'PATIENT'}" class="has-submenu">
                    <a th:href="@{#}">Dashboard</a>
                </li>
                <li th:if="${session.userRole == 'PATIENT'}" class="has-submenu">
                    <a th:href="@{#}">Doctors</a>
                </li>
                <li th:if="${session.userRole == 'PATIENT'}" class="has-submenu">
                    <a th:href="@{#}">Clinics</a>
                </li>
                <li th:if="${session.userRole == 'PATIENT'}" class="has-submenu">
                    <a th:href="@{#}">Favourites</a>
                </li>
                <!-- /Patient navbar items -->


                <!-- User profile -->
                <li th:if="${session.userEmail == null}" class="login-link">
                    <a th:href="@{/patient/login}">Login / Signup</a>
                </li>
                <li th:unless="${session.userEmail == null}" class="login-link">
                    <b th:text="${session.userEmail}"></b>
                </li>
                <!-- /User profile -->
            </ul>
        </div>
        <ul class="nav header-navbar-rht">

            <li th:if="${session.userEmail == null}" class="nav-item">
                <a class="nav-link header-login btn-one-light" th:href="@{/patient/login}">login / Signup </a>
            </li>
            <li th:unless="${session.userEmail == null}" class="nav-item">
                <b th:text="${session.userEmail}"></b>
            </li>

        </ul>
    </nav>
</header>
